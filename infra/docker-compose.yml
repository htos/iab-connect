# Docker Compose for IAB Connect Development Environment
# Start with: docker compose up -d

services:
  # PostgreSQL Database
  postgres:
    image: postgres:17
    container_name: iabconnect-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: iabconnect
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Keycloak Identity Provider
  keycloak:
    image: quay.io/keycloak/keycloak:26.5.2
    container_name: iabconnect-keycloak
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/iabconnect
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: postgres
      KC_HOSTNAME: localhost
      KC_HTTP_PORT: 8080
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak/realms:/opt/keycloak/data/import:ro
      - ./keycloak/providers/disable-new-users/target/disable-new-users-spi-1.0.0.jar:/opt/keycloak/providers/disable-new-users-spi.jar:ro
    depends_on:
      postgres:
        condition: service_healthy

  # MinIO Object Storage (S3-compatible)
  minio:
    image: minio/minio:latest
    container_name: iabconnect-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # MinIO Client for initial bucket setup
  minio-init:
    image: minio/mc:latest
    container_name: iabconnect-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb myminio/iabconnect-documents --ignore-existing;
      mc anonymous set download myminio/iabconnect-documents;
      exit 0;
      "

  # Seq Log Server (optional, for structured logging)
  seq:
    image: datalust/seq:latest
    container_name: iabconnect-seq
    restart: unless-stopped
    environment:
      ACCEPT_EULA: Y
    ports:
      - "5341:5341"
      - "8081:80"
    volumes:
      - seq_data:/data

volumes:
  postgres_data:
  minio_data:
  seq_data:
