# Docker Compose for IAB Connect Development Environment
# Start with: docker compose up -d

services:
  # PostgreSQL Database
  postgres:
    image: postgres:17
    container_name: iabconnect-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: iabconnect
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Keycloak Identity Provider
  keycloak:
    image: quay.io/keycloak/keycloak:26.5.2
    container_name: iabconnect-keycloak
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/iabconnect
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: postgres
      KC_HOSTNAME: localhost
      KC_HTTP_PORT: 8080
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak/realms:/opt/keycloak/data/import:ro
      - ./keycloak/providers/disable-new-users/target/disable-new-users-spi-1.0.0.jar:/opt/keycloak/providers/disable-new-users-spi.jar:ro
    depends_on:
      postgres:
        condition: service_healthy

  # RustFS Object Storage (S3-compatible)
  rustfs:
    image: rustfs/rustfs:latest
    container_name: iabconnect-rustfs
    restart: unless-stopped
    environment:
      RUSTFS_ACCESS_KEY: rustfsadmin
      RUSTFS_SECRET_KEY: rustfsadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - rustfs_data:/data
      - rustfs_logs:/logs
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-s",
          "-o",
          "/dev/null",
          "-w",
          "%{http_code}",
          "http://localhost:9000/",
        ]
      interval: 30s
      timeout: 20s
      retries: 3

  # MinIO Client for initial bucket setup (works with S3-compatible RustFS)
  rustfs-init:
    image: minio/mc:latest
    container_name: iabconnect-rustfs-init
    depends_on:
      rustfs:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myrustfs http://rustfs:9000 rustfsadmin rustfsadmin;
      mc mb myrustfs/iabconnect-documents --ignore-existing;
      exit 0;
      "

  # Mailhog - Local SMTP Server for Development (catches all emails)
  mailhog:
    image: mailhog/mailhog:latest
    container_name: iabconnect-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025" # SMTP Server
      - "8025:8025" # Web UI
    logging:
      driver: "none" # Disable logging to reduce noise

  # Seq Log Server (optional, for structured logging)
  seq:
    image: datalust/seq:latest
    container_name: iabconnect-seq
    restart: unless-stopped
    environment:
      ACCEPT_EULA: Y
    ports:
      - "5341:5341"
      - "8081:80"
    volumes:
      - seq_data:/data

volumes:
  postgres_data:
  rustfs_data:
  rustfs_logs:
  seq_data:
