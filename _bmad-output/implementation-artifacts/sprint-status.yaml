blish time), .dockerignore (8 category groups; source of truth since no frontend/.gitignore exists), public/.gitkeep (zero-byte placeholder — repo had no frontend/public/ but spec assumed standard Next.js layout; gitkeep makes AC-7 third COPY work and establishes the dir for future static assets). One README edit: generalized E12-S1's 'Option 3 Backend container image' section into 'Option 3 Container images' with both backend + frontend build commands. **Zero frontend/src/** changes.** Quality gates: typecheck exit 0 · lint 2 baseline-errors (no new) · vitest 127/127 green (E11-S3 baseline match, story adds zero tests as specified) · npm run build green via Task-3 spike. Docker evidence: dev-shape build 243 MB (target <=250 MB), beta-shape build green, both AC-14 bake-evidence greps returned matches (api.example.app baked into /app/.next/static/chunks/00eb41ece76a42fb.js as literal 'let t=\"https://api.example.app\"' AND docs.example.app baked into /app/.next/required-server-files.json AND /app/server.js env-block). Runtime smoke captured the critical `Network: http://0.0.0.0:3000` stdout line proving HOSTNAME override; curl returned HTTP 200 with 108118-byte body. Non-root verified via `docker exec ... id`: uid=1000(node). Task 10 fork-SOURCE_URL grep returned a match at /app/.next/static/chunks/3a532a83502e6991.js — bake-half done, visual-half stays [!] until E20-S4 lands the footer. **Two deviations the reviewer should know about:** (1) RUN `npm install -g npm@11` added to deps stage — node:22-alpine ships npm 10.9.8 but package-lock.json is npm-11-authored, npm 10's stricter lockfile parser reports `Missing: @swc/helpers@0.5.21 from lock file` even though the same `npm ci` passes on host npm 11.6.0; the in-image pin is the most reproducible fix; (2) frontend/public/.gitkeep added because the repo has no public/ directory and the AC-7 COPY would otherwise fail. A28 spike caught both of these as planned. Status transitions: e12-s2 in-progress -> review. Sprint st