review is its own heavy session. Per project memory `feedback_bmad_workflow` (hybrid: CR+ER at epic boundary), bmad-code-review now appropriately fires for the Epic-12 boundary diff.) ## Previously: bmad-dev-story for e12-s3-add-custom-keycloak-image-with-spi: COMPLETE. Two new files: infra/keycloak/Dockerfile (two-stage maven:3.9-eclipse-temurin-17 spi-build -> quay.io/keycloak/keycloak:26.5.2 kc-final; ARG KC_DB=postgres build-time parameter; 5 OCI labels; CMD start --optimized) and infra/keycloak/realms-beta/iabconnect-realm.json (sanitized realm — surgical edits to a copy of the dev realm: 2 client secrets swapped to ${IABCONNECT_*_CLIENT_SECRET} placeholders, iabconnect-frontend redirectUris/webOrigins updated to Railway+${FRONTEND_PUBLIC_URL} pattern dropping localhost:3000, 6 dev seed users with passwords removed). **DEVIATION from Task 1.3 the reviewer should see:** kept the single `service-account-iabconnect-admin` user — no credentials, just realm-management:realm-admin role mapping that gives the iabconnect-admin confidential client its admin-API privileges (used by KeycloakAdminService.cs:403). Removing it would silently break backend admin ops on Beta with no security benefit. AC-5's narrower wording (\"6 dev seed users\") was followed in preference to Task 1.3's broader \"users: []\" (the 7th user is service-account, not a seed user). **Three story Questions resolved + one new constraint discovered:** Q1 redirect URIs picked the conservative Railway+${FRONTEND_PUBLIC_URL} default dropping iabconnect.ch (production isn't on Beta gate); Q2 ${VAR} substitution for client.secret confirmed working in 26.5.2 by non-crashing smoke boot; Q3 realm-import idempotency confirmed via --import-realm flag on CMD args; Q4 FALSIFIED: --features= is for built-in Keycloak features only — custom SPI provider IDs are auto-discovered from /opt/keycloak/providers/. First build attempt failed with `'disable-new-users' is an unrecognized feature`; fixed by dropping the --features= flag. **NEW constraint:** KC_DB is build-time-frozen under --optimized (Quarkus augments classes per driver). First smoke run with -e KC_DB=dev-file rejected with `kc.db build-time options differ from what is persisted`. Resolution: parameterize Dockerfile with `ARG KC_DB=postgres` (production default matches E13-S2 Beta) and a separate `:smoke` tag built with `--build-arg KC_DB=dev-file` for local non-postgres smoke. Production image stays Beta-shape. Quality gates: docker build green 629 MB (target <=800) · smoke boot 10.515s (target <30) emits the `Keycloak 26.5.2 on JVM ... started in 10.515s` line · curl http://localhost:8090/realms/iabconnect/.well-known/openid-configuration => HTTP 200 6612B with parsed issuer/token_endpoint matching expectations · SPI registration confirmed via 3 independent evidence sources (build-time KC-SERVICES0047 log line, runtime ls /opt/keycloak/providers/ shows disable-new-users-spi.jar, successful realm import — Keycloak would refuse a realm referencing an unregistered eventsListener) · AC-14 no-secrets grep CLEAN (MSYS_NO_PATHCONV=1 prefix needed for Git-Bash path conversion) · AC-15 local-dev compose up postgres+keycloak still serves HTTP 200 on port 8080 (zero edits to docker-compose.yml, realms/iabconnect-realm.json, or providers/disable-new-users/*). Task 9 (manual browser round-trip via full stack) marked [!] per A30 — needs E12-S4's docker-compose.full.yml to orchestrate backend+frontend+custom-keycloak and a Beta tester account created post-boot via Admin Console; dev-agent non-interactivity scope. Status transitions: e12-s3 in-progress -> review. Sprint state: E20 in-progress (5 ready-for-dev) + E12 in-progress (3 review + 1 ready-for-dev). NEXT: per workflow.on_complete hybrid policy, Epic-12 boundary needs e12-s4 — recommend bmad-dev-story for e12-s4-add-optional-docker-compose-full (Wave-3 close + unblocks Task 9 manual verify for e12-s1/s2/s3). Per project memory `feedback_session_pacing_dev_cycles`, recommend committing this dev-story state and starting the e12-s4 dev-story in a fresh session.) ## Previously: bmad-dev-story for e12-s2-add-frontend-dockerfile-standalone: COMPLETE. Three new files at frontend/ — Dockerfile (multi-stage deps -> build -> runtime; node:22-alpine throughout; all 9 NEXT_PUBLIC_* declared as BOTH ARG and ENV per AC-4; HOSTNAME=0.0.0.0 mandatory; USER node UID 1000; OCI labels minus per-build revision/created which E20-S5 injects at GHCR publish time), .dockerignore (8 category groups; source of truth since no frontend/.gitignore exists), public/.gitkeep (zero-byte placeholder — repo had no frontend/public/ but spec assumed standard Next.js layout; gitkeep makes AC-7 third COPY work and establishes the dir for future static assets). One README edit: generalized E12-S1's 'Option 3 Backend container image' section into 'Option 3 Container images' with both backend + frontend build commands. **Zero frontend/src/** changes.** Quality gates: typecheck exit 0 · lint 2 baseline-errors (no new) · vitest 127/127 green (E11-S3 baseline match, story adds zero tests as specified) · npm run build green via Task-3 spike. Docker evidence: dev-shape build 243 MB (target <=250 MB), beta-shape build green, both AC-14 bake-evidence greps returned matches (api.example.app baked into /app/.next/static/chunks/00eb41ece76a42fb.js as literal 'let t=\"https://api.example.app\"' AND docs.example.app baked into /app/.next/required-server-files.json AND /app/server.js env-block). Runtime smoke captured the critical `Network: http://0.0.0.0:3000` stdout line proving HOSTNAME override; curl returned HTTP 200 with 108118-byte body. Non-root verified via `docker exec ... id`: uid=1000(node). Task 10 fork-SOURCE_URL grep returned a match at /app/.next/static/chunks/3a532a83502e6991.js — bake-half done, visual-half stays [!] until E20-S4 lands the footer. **Two deviations the reviewer should know about:** (1) RUN `npm install -g npm@11` added to deps stage — node:22-alpine ships npm 10.9.8 but package-lock.json is npm-11-authored, npm 10's stricter lockfile parser reports `Missing: @swc/helpers@0.5.21 from lock file` even though the same `npm ci` passes on host npm 11.6.0; the in-image pin is the most reproducible fix; (2) frontend/public/.gitkeep added because the repo has no public/ directory and the AC-7 COPY would otherwise fail. A28 spike caught both of these as planned. Status transitions: e12-s2 in-progress -> review. Sprint state: E20 in-progress (5 ready-for-dev) + E12 in-progress (2 review + 2 ready-for-dev). NEXT: per workflow.on_complete hybrid policy, only e12-s1 + e12-s2 are review-ready -- Epic-12 boundary still needs e12-s3 + e12-s4. Recommend bmad-dev-story for e12-s3 (custom Keycloak SPI image, Wave-3 sibling). Per project memory `feedback_session_pacing_dev_cycles`, commit this dev-story state and start the next dev-story in a fresh session.) ## Previously: bmad-dev-story for e12-s1-add-backend-dockerfile-multistage: COMPLETE. Backend Dockerfile (multi-stage .NET 10, Europe/Zurich tzdata, USER 1000 non-root, AGPL-3.0 OCI labels, BUILD_SHA/BUILD_DATE build-args defaulting to 'unknown') + backend/.dockerignore landed at backend/Dockerfile and backend/.dockerignore. **rustfsadmin Beta-blocker resolved** via paired edit on base appsettings.json:37-43 AND DocumentStorageSettings.cs:10-14 class-initializers — `strings src/IabConnect.Infrastructure/bin/Debug/net10.0/IabConnect.Infrastructure.dll | grep -i rustfsadmin` returns CLEAN; only appsettings.Development.json retains the dev literals (loads only when ASPNETCORE_ENVIRONMENT=Development, per AC-8). **Test-infrastructure timing seam at Infrastructure/DependencyInjection.cs:259 resolved** by env-var injection in TestWebApplicationFactory's static constructor — env vars are part of the default config chain set up by WebApplication.CreateBuilder at Program.cs:17, so they propagate to the eager `.Get<DocumentStorageSettings>()` read at Program.cs:32 BEFORE WebApplicationFactory's ConfigureAppConfiguration callbacks run at builder.Build() (Program.cs:34). Resolves the previously-deferred cleanup note at AppSettingsLayeringTests.cs:57-65 without touching the production DI registration (path 1 'IOptions refactor' explicitly out of scope per the story). AppSettingsLayeringTests extended with 6 new theory rows (3 DocumentStorage:* keys × 2 theories) guarding the AC-7 invariant for base AND Beta-layered config. **Two spec-vs-reality observations for reviewer:** (a) base image is Ubuntu 24.04 not Debian-bookworm — Microsoft moved aspnet:10.0 to Ubuntu Noble; ICU and tzdata both pre-bundled (apt-get install tzdata is now ~14B defense-in-depth); (b) image size 384 MB > 350 MB story target — root cause is untrimmed framework-dependent publish (154 MB vs 30 MB story estimate) due to Directory.Build.props Release config `PublishTrimmed=false` and the wide package profile (EF, Hangfire, Serilog, QuestPDF, MediatR, AWS S3); trimming/AOT optimization out of scope. Task 1.5 (interactive `dotnet run` against local infra/docker-compose.yml stack) flagged `[!]` per project-context A30. Task 10 (build-arg injection) executed directly as `[x]` — `docker build --build-arg` + `docker inspect` is non-interactive within dev-agent scope. Quality gates: dotnet build 0 warnings · dotnet test 1963/1963 green (baseline 1957 + 6 new theory rows) · docker build green in 65s · docker run emits bootstrap Serilog line BEFORE the expected Npgsql connection-refused crash · docker build --build-arg round-trips BUILD_SHA/BUILD_DATE into env. Status transitions: e12-s1 in-progress -> review. Sprint state: E20 in-progress (5 ready-for-dev) + E12 in-progress (1 review + 3 ready-for-dev). NEXT: per workflow.on_complete hybrid policy, only e12-s1 of Epic-12 is review-ready so far -- recommend bmad-dev-story for the next ready-for-dev story in sprint order (e20-s1 by top-to-bottom or e12-s2 to keep Wave-3 momentum). Per project memory `feedback_session_pacing_dev_cycles`, recommend committing this dev-story state and starting the follow-up in a fresh session.) ## Previously: bmad-create-story for entire Epic E12: COMPLETE. Comprehensive context files authored for e12-s2 (Frontend Dockerfile), e12-s3 (Custom Keycloak image with SPI), e12-s4 (docker-compose.full.yml overlay) -- all replace 20-line stubs with ~400-500 line dev-ready stories matching the e11-s3 / e12-s1 depth standard. **E12-S2 highlights:** three-stage Dockerfile (deps -> build -> runtime), node:22-alpine throughout, ALL 9 NEXT_PUBLIC_* vars declared as BOTH ARG and ENV (critical: ENV alone makes Next.js silently inline empty strings), `HOSTNAME=0.0.0.0` mandatory in runtime stage (the #1 silent-failure mode for Next.js standalone in Docker), `--chown=node:node` on the three runtime COPYs, standalone shape verified via E11-S3's outputFileTracingRoot. **E12-S3 highlights:** two-stage Dockerfile (maven:3.9-eclipse-temurin-17 spi-build -> quay.io/keycloak/keycloak:26.5.2), separate sanitized realm at new `infra/keycloak/realms-beta/iabconnect-realm.json` (preserves dev realm unchanged), AC-5 explicit sanitization spec (drop all 6 dev seed users, swap committed dev secrets at lines 228+252 for `${IABCONNECT_*_CLIENT_SECRET}` placeholders, update redirect URIs for Railway domain pattern), pre-build with `kc.sh build --features=disable-new-users` so runtime uses `start --optimized` (sub-15s start vs 30-60s without), AC-14 strings-grep verification that no committed secrets ship in the image, local-dev workflow unchanged (volume-mount path retained). **E12-S4 highlights:** overlay file (not replacement), 3 new app services (api/web/keycloak-full), base `keycloak` service deactivated via `profiles: [\"disabled-by-full\"]` to free host port 8080, one-shot `keycloak-full-realm-check` curl-poll service as realm-import health gate, explicit annotation of localhost-vs-compose-hostname rule per env var (NEXT_PUBLIC_* use localhost because browser-resolved; server-side env vars use compose hostnames), local-dev secrets reused directly (not env-indirected -- they are local convenience, NOT real Beta secrets), HARD upstream gate (Task 0 spike verifies all 3 Dockerfiles exist before authoring). All 3 stories carry project-context A28-A30: Task 0 spike-first, AC-Subitem Completion Check, [!] manual-verify markers for browser-interactive flows. Status transitions: e12-s2 backlog->ready-for-dev; e12-s3 backlog->ready-for-dev; e12-s4 backlog->ready-for-dev. Sprint state: E20 in-progress (5 ready-for-dev) + E12 in-progress (4 ready-for-dev, 0 backlog -- entire epic context-ready). NEXT: bmad-dev-story for e12-s1 to start Wave-3 implementation. e12-s4 has HARD upstream gate -- its Task 0 will HALT until e12-s1, e12-s2, e12-s3 Dockerfiles all land. Per project memory `feedback_session_pacing_dev_cycles`, recommend committing this front-loaded context + sprint-status update and starting dev-story in a fresh session.) ## Previously: bmad-create-story for e12-s1-add-backend-dockerfile-multistage: COMPLETE. Comprehensive story file authored at _bmad-output/implementation-artifacts/e12-s1-add-backend-dockerfile-multistage.md (replaces the 167-line pre-pivot stub). 14 ACs (BDD-shaped, file:line anchored), 11 tasks (Task-0 spike + Task-1 paired edit + Task-2 .dockerignore + Task-3 Dockerfile + Tasks 4-7 verification + Task-8 README + Task-9 quality gates + Task-10 [!] manual Beta-shape build-arg). Three corrections versus the pre-pivot stub: (a) SDK/runtime tags 9.0->10.0 (global.json pins 10.0.102; Directory.Build.props targets net10.0); (b) explicit `/p:PublishSingleFile=false` override in `dotnet publish` to neutralize the Release-config-default at Directory.Build.props:14 that would otherwise produce a single-file binary incompatible with `ENTRYPOINT [\"dotnet\",\"IabConnect.Api.dll\"]`; (c) rustfsadmin Beta-blocker resolved as a paired edit -- AC-7.1 strips credentials from appsettings.json:37-43, AC-7.2 strips matching class initializers from DocumentStorageSettings.cs:10-14 to take the strings out of compiled IL (verified by Task 1.6 `strings *.dll | grep rustfsadmin` -> CLEAN). Lazy-init via IAmazonS3 singleton factory at DependencyInjection.cs:261-270 means missing Railway env vars surface as a 500 on first /api/documents/... call rather than a boot crash -- documented as the intended fail mode. Epic-11 retro A28/A29/A30 woven in: Task 0 spike-first for the (deceptively) low-risk JSON edit; Task 9.5 AC-Subitem Completion Check at story close; Task 10 [!] marker for non-interactive manual verification. Status transitions: epic-12 backlog->in-progress; e12-s1 backlog->ready-for-dev. Sprint state: E20 in-progress (5 ready-for-dev) + E12 in-progress (1 ready-for-dev, 3 backlog). NEXT: bmad-dev-story for e12-s1, OR bmad-create-story for e12-s2 (frontend Dockerfile, Wave-3 sibling) if user wants parallel context for the next dev session. Per project memory `feedback_session_pacing_dev_cycles` user prefers commit-then-fresh after heavy review sessions -- recommend committing this context file + sprint-status update then starting dev-story in a fresh conversation.) ## Previously: bmad-retrospective for Epic E11: COMPLETE. Retro doc saved at epic-11-retro-2026-05-16.md. 3 new action items A28 (Spike-First for low-risk-mechanical cleanup specs) / A29 (AC-Subitem Completion Check at Story Close) / A30 (Three-State Task Checkbox [x]/[!]/[ ] for Manual-Verify ACs) — all promoted to project-context.md as Rules. A27 from Epic 10 retro carried forward (dev-API restart docs). E10 follow-through: A24 N/A (no interim patches in E11), A25 Applied (no patch demotions), A26 Applied (D4 fail-mode companion-surface evaluation), A27 Not Addressed (carry forward to E12-S1). E11 Beta-blocker: rustfsadmin literals in base appsettings.json — must resolve in E12-S1 (IOptions refactor OR image-side .dockerignore route, decision deferred to bmad-create-story for e12-s1). Sprint state: epic-11 done + epic-11-retrospective done (this update). NEXT: per workflow.on_complete hybrid policy, bmad-create-story for e12-s1-add-backend-dockerfile-multistage — Wave 3 start. The first E12 story scope must explicitly decide rustfsadmin disposition.) ## Previously: bmad-code-review for Epic E11 boundary: COMPLETE. Adversarial review (Blind Hunter + Edge Case Hunter + Acceptance Auditor) over full E11 diff (S1+S2+S3, ~2772 lines) produced 4 decisions + 6 patches + 7 defers + ~17 dismisses. All 4 decisions resolved: D1 + D2 -> defer (rustfsadmin pre-Beta follow-up via IOptions refactor; AC-9 test gap blocked by E15-S2 Database__AutoMigrate); D3 + D4 -> patch (BetaBanner case-insensitive envLabel?.trim().toLowerCase() === 'beta'; RegisterRetentionEnforcementJob orphan-RemoveIfExists branch). 6 patches applied: E11-S2 BetaBanner (case-insensitive, sessionStorage try/catch for Safari Private Browsing, lazy useState init to kill flash-of-orange flicker, fork-friendly feedback URL via NEXT_PUBLIC_SOURCE_URL fallback), NEXT_PUBLIC_FEEDBACK_URL documented in frontend/.env.example, RegisterRetentionEnforcementJob else-RemoveIfExists branch; E11-S3 parseDocumentHost rejects path/query/fragment/userinfo/IPv6 with cited offending field and wraps URL constructor errors with env-var-name breadcrumb. Test deltas: backend 1957/1957 stays green (1 test renamed Register_DoesNothing -> Register_RemovesJob); frontend Vitest 113 -> 127 across 17 files (+14 net: +7 parser hardening cases, +7 BetaBanner cases). Smoke build green with all 3 Beta env vars baked. 7 defers logged in deferred-work.md under 'code review of Epic E11 boundary (2026-05-16)' section: BetaBanner test semantics (build-time vs runtime), appsettings.Beta.json Logging.LogLevel duplication, empty Authority/Smtp slow runtime failures, AppSettingsLayeringTests deferred-key coverage, E11-S2 Task 11 process smell, outputFileTracingRoot scope-add disclosure, .env.example line-number anchor rot. Status: e11-s1/s2/s3 all done; epic-11 in-progress -> done. NEXT: bmad-retrospective for Epic-11 close, then bmad-create-story for Wave-3 (E12-S1 Backend Dockerfile, E12-S2 Frontend Dockerfile, E12-S3 Custom Keycloak SPI image).)"
