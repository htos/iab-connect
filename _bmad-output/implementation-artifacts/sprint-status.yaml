ady-for-dev); E24-E31 backlog (skeletons). NEXT per workflow + feedback_session_pacing_dev_cycles + A34: commit this 4-story whole-epic preparation + sprint-status update, then bmad-dev-story for e23-s1 in a fresh session (S1→S2→S3→S4 HARD-ordered). Independent of the still-open Beta go-live walkthrough.) ## Previously: 2026-06-07 (bmad-sprint-planning for Epic-21 Frontend Refactoring foundation: added epic-21 + e21-s1..s5 + retrospective to development_status. **E21 = foundation+pilot of the whole-frontend refactoring program** (97 page.tsx / ~13 domains); the domain migration epics E22-E31 live in _bmad-output/planning-artifacts/frontend-refactoring-roadmap.md and are authored via bmad-create-epics-and-stories AFTER the Suppliers pilot (E21-S3) closes. Tech-initiative epic (no REQ); grounded in docs/frontend-refactoring-gate1-analysis.md (Gate-1 as-is) + epics-and-stories.md Epic E21. Sequence S1->S2->S3->S5 with S4 parallel. Statuses: e21-s1/s2/s4 ready-for-dev (startable now, no dep), e21-s3 backlog (dep S1+S2), e21-s5 backlog (dep S3); epic-21 in-progress. The earlier S6-S9 sponsor/member/event/finance stubs were superseded by the roadmap and removed. NEXT: bmad-dev-story for e21-s1 in a fresh session (per feedback_session_pacing_dev_cycles). Independent of the still-open Beta go-live walkthrough.) ## Previously: 2026-06-07 (bmad-create-story BULK REFRESH for entire Epic-6 (Finance Planning, REQ-044): COMPLETE. **Third deferred-backlog feature epic resumed** (after E4 + E5 closed). Per user directive 'für das nächste ganze epic alle stories implementierungs ready machen' (2026-06-07), scope is post-MVP-comprehensive. Gate posture identical to E4/E5: epics-and-stories.md L99 'E4–E8 resume only after Beta validation completes' is still open (carried-forward E14/E16/E17/E18/E19 live-[!] Beta-walkthrough remains OUTSTANDING pending Harry's GREEN Beta deploy); user continued down the deferred backlog (E6 next) — gate overridden as for E4/E5. All 3 stories refreshed from 2026-05-12 pre-pivot stubs (placeholder ACs 'Given the page is loaded in desktop and mobile layouts…then eF migration adds required tables', stale e1-s1/MFA 'Latest Technical Context', filler statements) to comprehensive dev-ready per A34. **Epic shape — backend finance feature (Budget model → cost-center association → Soll/Ist report).** **A56 existing-implementation spike (4 parallel Explore agents over Domain/Application + Infrastructure/API + frontend finance + planning/docs) — load-bearing finding: `ActivityArea` (REQ-068) IS the cost center.** It already exists (admin-managed activity/project/division tag: Code/Name/Color/IsActive/soft-delete) AND is already referenced by Transaction/InvoiceItem/JournalEntryLine via nullable ActivityAreaId; the transactions entry form already has an ActivityArea selector ([transactions/page.tsx](../../frontend/src/app/finance/transactions/page.tsx):983-988); the journal export already emits ActivityAreaId/Code; Invoice header + Payment do NOT carry ActivityAreaId. The REQ-044 CSV example ('Auswertung nach Event/Projekt (Diwali etc.)') is exactly ActivityArea's purpose. **Two epic-shaping decisions surfaced to the user via AskUserQuestion (per feedback_decisions_via_ask_tool — they change the ACs themselves, not routine DECs):** (1) **Kostenstellen-Modell → 'ActivityArea wiederverwenden'**: NO new CostCenter entity; E6-S1 builds only a `Budget` entity (amount per ActivityArea per FiscalPeriod); E6-S2 becomes verification + targeted frontend-selector gap-fill (association already largely ships); E6-S3 sums actuals by ActivityAreaId. (2) **Autorisierung → 'Bestehende Finance-Policies'**: reuse RequireFinanceRead (Admin/Kassier/Auditor) + RequireFinanceWrite (Admin/Kassier) + Module:finance; Vorstand excluded (the AC + architecture authz matrix name Vorstand, but Vorstand has NO finance access today — adding it is a separate module-wide change, out of scope). **Per-story content:** e6-s1 = net-new `Budget` aggregate (decimal(18,2), FinanceCurrency enum, soft-delete + filtered unique index on active (activity_area_id, fiscal_period_id)) + EF config/migration/repo + MediatR CRUD + validators + BudgetEndpoints + frontend budgets page; AC-1 (cost-center CRUD) is verify-only (ActivityArea already ships); embedded DECs: DEC-2 entity name (rec: `Budget`), DEC-3 keying (rec: FiscalPeriodId for AC-fidelity + locked-period reuse; annual fallback noted), DEC-4 currency (rec: from active FinanceProfile). e6-s2 = verification + gap-fill (Task-0 coverage matrix sizes it); fill missing ActivityArea selectors on invoice-item/journal-line forms; prove locked-period + backward-compat (null) invariants; export parity; DEC-1 RESOLVED: actuals-bearing line/transaction records only, Invoice/Payment headers stay excluded (double-count guard, A65). e6-s3 = read-model Soll/Ist query (server-side GroupBy by ActivityAreaId within FiscalPeriod StartDate/EndDate; full-outer-merge budgets↔actuals; variance + variance% divide-by-zero-guarded) + CSV export via ExportFileResult/EscapeCsv (audited FinanceExported) + report page mirroring [accounting-reports/page.tsx](../../frontend/src/app/finance/accounting-reports/page.tsx); DEC-1 actuals source (rec: Transaction for SimpleCash v1, A68 QGT states concrete v1 behavior; do not also sum InvoiceItem = double-count), DEC-2 period-vs-year must match S1 keying, DEC-4 export CSV. **Cross-cutting:** dev-story order S1→S2→S3 HARD (S3 consumes S1 Budget + S2 association; A62 verify-sibling-shipped at Task 0); single-aggregate writes use repo.AddAsync + IUnitOfWork.SaveChangesAsync + IAuditService (A61 N/A — no multi-aggregate coordinator); register new DI services (IBudgetRepository) in finance endpoint-metadata harnesses (A63); frontend stories carry A35/A46 (cleanup), A64 (stable useTranslations), A51 (de/en parity, no hi.json), A58 (changed-files lint/format); Budget.Currency uses Domain-level FinanceCurrency so A69 string-storage workaround N/A. **Status transitions:** epic-6 backlog → in-progress; e6-s1/s2/s3 backlog → ready-for-dev. Sprint state: E1-E3 + E9-E20 + E4 + E5 done (16 epics closed); E6 in-progress (3 ready-for-dev); E7-E8 deferred backlog (pre-Beta-pivot). NEXT per workflow + feedback_session_pacing_dev_cycles + A34: recommend committing this 3-story bulk-context refresh + sprint-status update and starting bmad-dev-story for e6-s1 in a fresh session. NOTE: carried-forward E14/E16/E17/E18/E19 live-[!] Beta-walkthrough queue remains OUTSTANDING (Harry's green-Beta prerequisites) — independent of E6.) ## Previously: 2026-06-02 (bmad-create-story BULK REFRESH for entire Epic-16 (Frontend ↔ Backend Integration on Railway): COMPLETE. All 3 stub files (e16-s1/s2/s3, previously 19-line drafts) replaced with comprehensive ~500-650 line dev-ready stories per A34 (bulk spec-refresh at epic start when N≥3 stories in one session) and user 2026-06-02 directive 'Bulk: all 3 Epic-16-stories, but with in mind its not a mvp anymore' (no longer MVP → robustness + completeness wins over minimal compliance). **Refresh deltas vs. 2026-05-15 stubs:** (1) **e16-s1** (Verify frontend public URLs) — full author from 19-line stub to 13 ACs + 7 Tasks. Key concretizations: 5 required NEXT_PUBLIC_* enforced by Dockerfile:76-81 fail-fast guard + 4 optional with defaults; 8 GHA repo variables (`NEXT_PUBLIC_*_BETA`); the in-image grep targets BOTH `.next/static/` AND `.next/standalone/.next/static/` because of `output: standalone`; new Vitest test for ARG/ENV bridge contract at `frontend/src/lib/config/dockerfile-public-vars.test.ts`; doc Section 17 ('Frontend public URLs: bake verification + redirect-URI verification (E16-S1)') appended to `docs/14_beta_railway_setup.md` per A38; A31 5-anchor + inverse parity (NEXT_PUBLIC_API_URL → image bake → backend Frontend__BaseUrl as CORS allowlist). Status: backlog → ready-for-dev. (2) **e16-s2** (End-to-end OIDC in Beta) — full author from 19-line stub to 13 ACs + 7 Tasks. **CRITICAL spec-vs-reality delta surfac